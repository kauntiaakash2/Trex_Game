<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Dash Runner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">Neon Dash Runner</div>
      <div class="meta">Space/↑ Jump • ↓ Duck • P Pause</div>
      <button id="audio-toggle" class="ghost-btn" type="button">🔊 Audio On</button>
    </header>

    <section class="stage-wrap">
      <canvas id="game" width="1100" height="500" aria-label="Endless runner game canvas"></canvas>
      <div id="overlay" class="overlay"></div>
    </section>

    <section class="hud-row">
      <div class="chip">Score: <strong id="score-value">0</strong></div>
      <div class="chip">Best: <strong id="best-value">0</strong></div>
      <div class="chip">x<span id="multiplier-value">1</span> Multiplier</div>
      <div class="chip" id="power-status">No Power-up</div>
    </section>

    <section class="touch-controls">
      <button id="btn-jump" type="button">Jump / Tap</button>
      <button id="btn-duck" type="button">Duck (Hold)</button>
      <button id="btn-pause" type="button">Pause</button>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
