<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Rex Runner Web</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrapper">
    <h1>🦖 T-Rex Runner</h1>
    <p class="subtitle">Jump, duck, and survive. Compete on the global leaderboard.</p>

    <canvas id="game" width="960" height="420" aria-label="T-Rex Runner game canvas"></canvas>

    <section class="controls">
      <strong>Controls:</strong>
      <span><kbd>Space</kbd>/<kbd>↑</kbd> Jump</span>
      <span><kbd>↓</kbd>/<kbd>S</kbd> Duck</span>
      <span><kbd>R</kbd> Restart</span>
    </section>

    <section class="touch-controls" aria-label="touch controls">
      <button id="btn-jump" type="button">Jump</button>
      <button id="btn-duck" type="button">Duck</button>
      <button id="btn-restart" type="button">Restart</button>
    </section>

    <section class="leaderboard">
      <h2>🏆 Live Leaderboard</h2>
      <form id="score-form" class="score-form">
        <input id="player-name" maxlength="20" placeholder="Enter your name" required />
        <button id="btn-submit-score" type="submit">Submit Score</button>
      </form>
      <p id="score-message" class="score-message"></p>
      <ol id="leaderboard-list"></ol>
    </section>
  </main>

  <script src="game.js"></script>
</body>
</html>
